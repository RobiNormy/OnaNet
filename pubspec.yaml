name: ona_net
description: "Ona Net wifi discovery"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  flutter_launcher_icons: ^0.14.4
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_map: ^8.3.0
  http: ^1.6.0
  latlong2: ^0.9.1
  firebase_auth: ^6.5.1
  firebase_core: ^4.9.0
  google_sign_in: ^7.2.0
  dio: ^5.9.2
  file_picker: ^11.0.2
  camera: ^0.12.0+1
  http_parser: ^4.1.2
  mime: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/images/OnaNet.png"
  min_sdk_android: 21

flutter:

  uses-material-design: true

  assets:
    - lib/images/whatsapp.webp
    - lib/images/noback.png
