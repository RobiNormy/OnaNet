name: ona_net
description: "Ona Net wifi discovery"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  flutter_launcher_icons: ^0.14.4
  geolocator: ^14.0.2
  geocoding: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/images/OnaNet.png"
  min_sdk_android: 21

flutter:

  uses-material-design: true

  assets:
    - lib/images/whatsapp.webp


